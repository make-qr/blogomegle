{% assign slot = include.slot | default: site.adsense.slots.leaderboard %}
{% if site.adsense.client and slot %}
<aside class="blog-ad blog-ad-leaderboard" aria-label="Advertisement">
  <ins class="adsbygoogle"
       style="display:block;min-height:90px;max-height:120px;overflow:hidden"
       data-ad-client="{{ site.adsense.client }}"
       data-ad-slot="{{ slot }}"
       data-ad-format="horizontal"
       data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</aside>
{% endif %}
