<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  {% include head.html %}
</head>
<body class="{% if page.url == '/' %}page-home{% elsif page.layout == 'post' %}page-post{% elsif page.page_kind == 'archive' %}page-archive{% else %}page-static{% endif %}">
  {% include header.html %}
  <main class="site-main">
    <div class="container {% if page.full_width %}container-wide{% else %}content-wrap{% endif %}">
      {{ content }}
    </div>
  </main>
  {% include footer.html %}
</body>
</html>
