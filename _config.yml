title: OmegleChat Blog
description: Essays on human connection, random chat safety, and life after Omegle — by the OmegleChat editorial team.
url: https://blog.omeglechat.online
baseurl: ""
lang: en
timezone: UTC
markdown: kramdown
kramdown:
  input: GFM
permalink: /:categories/:slug/
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

main_site: https://omeglechat.online
chat_url: https://omeglechat.online/chat.html

# AdSense — same account as omeglechat.online (ads-config.js)
adsense:
  client: ca-pub-4151519079019358
  slots:
    leaderboard: "7974813655"

author:
  name: OmegleChat Editorial
  default_writer: Morgan Rivers

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      full_width: true
  - scope:
      path: ""
      type: pages
    values:
      layout: page

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - DEPLOY.md
  - HUONG-DAN-VIET-BAI-BLOG.md
  - sync-from-seo.py
  - assign-post-covers.py
  - download-cover-images.py
  - download-post-images.py
  - check-links.py
  - reassign-late-bloom-images.py
  - fix-guides-and-audio.py
  - vendor
  - .bundle
